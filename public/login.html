<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GreenMart</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🍃</text></svg>">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Hero Section -->
        <div class="hero-section">
            <div class="hero-content">
                <div class="logo-badge">
                    <span class="logo-icon">🍃</span>
                    <div class="logo-text">
                        <h1>GreenMart</h1>
                        <p>Premium Grocery</p>
                    </div>
                </div>
                
                <div class="hero-message">
                    <h2>Smart Shopping Made Simple</h2>
                    <p>Experience the future of grocery shopping with our intelligent billing and management system.</p>
                </div>

            </div>
        </div>

        <!-- Right Form Section -->
        <div class="form-container">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="your username" required>
                            <span class="input-icon">👤</span>
                        </div>
                        <span class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <span class="input-icon">🔐</span>
                        </div>
                        <span class="error-msg"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>

                <div class="divider"><span>or</span></div>

                <button class="btn btn-secondary" onclick="goToRegister()">Create New Account</button>

                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html" class="link">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="error-alert" id="errorAlert"></div>
    <div class="success-alert" id="successAlert"></div>

    <script src="js/script.js"></script>
    <script>
        function goToRegister() {
            window.location.href = 'register.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showErrorAlert('All fields are required');
                return;
            }

            const loginResult = loginUser(username, password);
            if (loginResult.success) {
                showSuccessAlert('Login successful! Redirecting...');
                setTimeout(() => {
                    const user = getCurrentUser();
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'user.html';
                }, 1200);
            } else {
                showErrorAlert(loginResult.message);
            }
        });

        function showErrorAlert(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        function showSuccessAlert(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
