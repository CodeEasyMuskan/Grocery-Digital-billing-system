<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - GreenMart</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🍃</text></svg>">
    <link rel="stylesheet" href="css/user.css">
</head>
<body>
    <div class="user-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🍃 GreenMart</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="shop">
                    <span class="icon">🛍️</span>
                    <span class="label">Shop</span>
                </a>
                <a href="#" class="nav-item" data-page="cart">
                    <span class="icon">🛒</span>
                    <span class="label">Cart</span>
                    <span class="badge" id="cartBadge">0</span>
                </a>
                <a href="#" class="nav-item" data-page="bills">
                    <span class="icon">📋</span>
                    <span class="label">My Bills</span>
                </a>
                <a href="#" class="nav-item" data-page="profile">
                    <span class="icon">👤</span>
                    <span class="label">Profile</span>
                </a>
                <a href="#" class="nav-item" data-page="ai">
                    <span class="icon">🤖</span>
                    <span class="label">Assistant</span>
                </a>
                <a href="#" class="nav-item" onclick="logoutUser(); return false;">
                    <span class="icon">🚪</span>
                    <span class="label">Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h1>Welcome to GreenMart</h1>
                </div>
                <div class="header-right">
                    <span class="theme-toggle" onclick="toggleTheme()">🌙</span>
                    <span class="user-info" id="userInfo">User</span>
                </div>
            </header>

            <!-- Shop Page -->
            <div id="shop-page" class="page-content active">
                <h2>Shop Products</h2>
                <div id="productsGrid" class="products-grid">
                    <!-- Populated by script -->
                </div>
            </div>

            <!-- Cart Page -->
            <div id="cart-page" class="page-content">
                <h2>Shopping Cart</h2>
                <div class="cart-container">
                    <div id="cartItems" class="cart-items">
                        <!-- Populated by script -->
                    </div>
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">₹0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>GST (5%)</span>
                            <span id="gst">₹0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Discount</span>
                            <input type="number" id="discountInput" placeholder="Enter discount" min="0" max="100">
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="total">₹0.00</span>
                        </div>
                        <button class="btn btn-primary" onclick="proceedToPayment()">Proceed to Payment</button>
                    </div>
                </div>
            </div>

            <!-- Bills Page -->
            <div id="bills-page" class="page-content">
                <h2>My Bills</h2>
                <div class="table-container">
                    <table class="bills-table">
                        <thead>
                            <tr>
                                <th>Bill Number</th>
                                <th>Date</th>
                                <th>Payment Method</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="billsTableBody">
                            <!-- Populated by script -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Profile Page -->
            <div id="profile-page" class="page-content">
                <div class="profile-card">
                    <h2>My Profile</h2>
                    <div class="profile-section">
                        <div class="profile-avatar">
                            <img id="profilePhoto" src="https://via.placeholder.com/100?text=Profile" alt="Profile">
                            <input type="file" id="photoUpload" accept="image/*" onchange="handlePhotoUpload()">
                            <button class="btn btn-secondary" onclick="document.getElementById('photoUpload').click()">Upload Photo</button>
                        </div>
                        <div class="profile-info">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="profileUsername" disabled>
                            </div>
                            <div class="form-group">
                                <label>Change Password</label>
                                <input type="password" id="newPassword" placeholder="Enter new password (min 4 chars)">
                            </div>
                            <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI Assistant Page -->
            <div id="ai-page" class="page-content">
                <div class="ai-container">
                    <h2>GreenMart AI Assistant</h2>
                    <div class="ai-select">
                        <label for="aiQuestion">Select a question:</label>
                        <select id="aiQuestion" onchange="handleAIQuestion()">
                            <option value="">Choose a topic...</option>
                            <option value="cart">How to use the cart?</option>
                            <option value="payment">What payment methods are available?</option>
                            <option value="bill">How do I view my bills?</option>
                            <option value="return">What is your return policy?</option>
                            <option value="delivery">How long does delivery take?</option>
                        </select>
                    </div>
                    <div id="aiResponse" class="ai-response"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bill Details Modal -->
    <div id="billModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBillModal()">&times;</span>
            <div id="billDetails"></div>
            <button class="btn btn-primary" onclick="printBill()">Print Bill</button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Check auth on page load
        window.addEventListener('load', function() {
            checkUserAuth();
            setupNavigation();
            loadShop();
            updateCartBadge();
            loadTheme();
        });

        function checkUserAuth() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
            }
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            }
            document.getElementById('userInfo').textContent = user.username;
        }

        function setupNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (this.getAttribute('data-page')) {
                        e.preventDefault();
                        switchPage(this.getAttribute('data-page'));
                        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                        this.classList.add('active');
                    }
                });
            });
        }

        function switchPage(pageName) {
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageName + '-page').classList.add('active');

            if (pageName === 'shop') loadShop();
            if (pageName === 'cart') loadCart();
            if (pageName === 'bills') loadMyBills();
            if (pageName === 'profile') loadProfilePage();
        }

        function loadShop() {
            const products = getAllProducts();
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200?text=${product.name}'">
                    <h3>${product.name}</h3>
                    <p class="price">₹${product.price.toFixed(2)}</p>
                    <p class="stock ${product.stock > 0 ? 'in-stock' : 'out-stock'}">
                        ${product.stock > 0 ? `Stock: ${product.stock}` : 'Out of Stock'}
                    </p>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="addToCart(${product.id}, '${product.name}', ${product.price})" ${product.stock <= 0 ? 'disabled' : ''}>Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(productId, productName, productPrice) {
            const cart = getCart();
            const existing = cart.find(item => item.productId === productId);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ productId, name: productName, price: productPrice, quantity: 1 });
            }
            
            saveCart(cart);
            updateCartBadge();
            showAddedToCartMessage(productName);
        }

        function showAddedToCartMessage(productName) {
            const msg = document.createElement('div');
            msg.className = 'toast-message';
            msg.textContent = `✓ ${productName} added to cart!`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        function loadCart() {
            const cart = getCart();
            const container = document.getElementById('cartItems');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = '<p class="empty-cart">Your cart is empty</p>';
                updateCartSummary();
                return;
            }

            cart.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>₹${item.price.toFixed(2)}</p>
                    </div>
                    <div class="item-quantity">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                    <div class="item-total">
                        ₹${(item.quantity * item.price).toFixed(2)}
                    </div>
                    <button class="btn btn-danger btn-small" onclick="removeFromCart(${index})">Remove</button>
                `;
                container.appendChild(itemDiv);
            });

            updateCartSummary();
        }

        function updateQuantity(index, change) {
            const cart = getCart();
            cart[index].quantity += change;
            if (cart[index].quantity < 1) {
                cart.splice(index, 1);
            }
            saveCart(cart);
            loadCart();
            updateCartBadge();
        }

        function removeFromCart(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            loadCart();
            updateCartBadge();
        }

        function updateCartSummary() {
            const cart = getCart();
            const subtotal = cart.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const gst = (subtotal - discount) * 0.05;
            const total = subtotal - discount + gst;

            document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(2);
            document.getElementById('gst').textContent = '₹' + gst.toFixed(2);
            document.getElementById('total').textContent = '₹' + total.toFixed(2);
        }

        document.getElementById('discountInput')?.addEventListener('change', updateCartSummary);
        document.getElementById('discountInput')?.addEventListener('input', updateCartSummary);

        function proceedToPayment() {
            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            sessionStorage.setItem('cartForPayment', JSON.stringify(cart));
            window.location.href = 'payment.html';
        }

        function loadMyBills() {
            const user = getCurrentUser();
            const allBills = getAllBills();
            const userBills = allBills.filter(bill => bill.userId === user.id);
            const tbody = document.getElementById('billsTableBody');
            tbody.innerHTML = '';

            if (userBills.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No bills yet</td></tr>';
                return;
            }

            userBills.forEach(bill => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${bill.billNumber}</td>
                    <td>${bill.date}</td>
                    <td>${bill.paymentMethod}</td>
                    <td>₹${bill.total.toFixed(2)}</td>
                    <td><button class="btn btn-small" onclick="viewBillDetails('${bill.billNumber}')">View</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewBillDetails(billNumber) {
            const bill = getBillByNumber(billNumber);
            if (bill) {
                const details = `
                    <h3>Bill #${bill.billNumber}</h3>
                    <p><strong>Date:</strong> ${bill.date}</p>
                    <p><strong>Payment Method:</strong> ${bill.paymentMethod}</p>
                    <hr>
                    <h4>Items:</h4>
                    ${bill.items.map(item => `<p>${item.name} x${item.quantity} = ₹${(item.price * item.quantity).toFixed(2)}</p>`).join('')}
                    <hr>
                    <p><strong>Subtotal:</strong> ₹${bill.subtotal.toFixed(2)}</p>
                    <p><strong>GST (5%):</strong> ₹${bill.gst.toFixed(2)}</p>
                    <p><strong>Discount:</strong> ₹${bill.discount.toFixed(2)}</p>
                    <p><strong>Total:</strong> ₹${bill.total.toFixed(2)}</p>
                `;
                document.getElementById('billDetails').innerHTML = details;
                window.currentBill = bill;
                document.getElementById('billModal').style.display = 'block';
            }
        }

        function closeBillModal() {
            document.getElementById('billModal').style.display = 'none';
        }

        function printBill() {
            window.print();
        }

        function loadProfilePage() {
            const user = getCurrentUser();
            document.getElementById('profileUsername').value = user.username;
            const profilePhoto = localStorage.getItem(`profilePhoto_${user.id}`);
            if (profilePhoto) {
                document.getElementById('profilePhoto').src = profilePhoto;
            }
        }

        function handlePhotoUpload() {
            const file = document.getElementById('photoUpload').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const user = getCurrentUser();
                    localStorage.setItem(`profilePhoto_${user.id}`, e.target.result);
                    document.getElementById('profilePhoto').src = e.target.result;
                    alert('Photo updated successfully!');
                };
                reader.readAsDataURL(file);
            }
        }

        function changePassword() {
            const newPassword = document.getElementById('newPassword').value;
            if (!newPassword || newPassword.length < 4) {
                alert('Password must be at least 4 characters');
                return;
            }
            updateUserPassword(getCurrentUser().id, newPassword);
            alert('Password updated successfully!');
            document.getElementById('newPassword').value = '';
        }

        function handleAIQuestion() {
            const question = document.getElementById('aiQuestion').value;
            const responses = {
                cart: 'Using the cart:\n1. Click "Add to Cart" on any product\n2. View your cart to adjust quantities\n3. Apply discounts if available\n4. Click "Proceed to Payment" to checkout',
                payment: 'Payment methods available:\n• Cash Payment\n• UPI (via UPI ID)\n• Card (Debit/Credit)\n• Net Banking (Direct bank transfer)',
                bill: 'To view your bills:\n1. Go to "My Bills" section\n2. See all your past purchases\n3. Click "View" to see bill details\n4. Print bills for records',
                return: 'Return Policy:\n• 7 days for unopened items\n• Contact support for issues\n• Full refund within 5 business days\n• Fresh items cannot be returned',
                delivery: 'Delivery Information:\n• Standard: 2-3 business days\n• Express: Next day\n• Free delivery on orders above ₹500\n• Track your order in real-time'
            };
            
            if (responses[question]) {
                const responseDiv = document.getElementById('aiResponse');
                responseDiv.innerHTML = `<div class="ai-bubble">${responses[question]}</div>`;
                responseDiv.style.display = 'block';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
        }

        function toggleSidebar() {
            document.querySelector('.user-container').classList.toggle('sidebar-open');
        }

        function updateCartBadge() {
            const cart = getCart();
            const badge = document.getElementById('cartBadge');
            badge.textContent = cart.length;
        }
    </script>
</body>
</html>
